{% extends "base.html" %}

{% block title %}Pilih jenis laporan{% endblock %}

{% block style %}
    <link rel="stylesheet" href="{{ url_for('static', filename='borang.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='button.css') }}">
{% endblock %}

{% block navbar %}
    {% include 'admin_navbar.html' %}
{% endblock %}

{% block content %}
    <h3>PILIH JENIS LAPORAN</h3>
    <form action="{{ url_for('laporan.laporan_cetak') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <table>
            <tr>
                <td>Jenis Laporan</td>
                <td>
                    <select name="pilih" id="pilih" onchange="papar_pilihan()">
                        <option value="1">Keputusan ikut Jumlah Undi</option>
                        <option value="2">Keputusan ikut Peratus Undi</option>
                    </select>
                </td>
            </tr>
        </table>
        <button type="submit" class="papar">Papar</button>
    </form>
{% endblock %}
